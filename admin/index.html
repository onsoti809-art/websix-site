<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Websix — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0b12;--ink:#12121c;--panel:#fff;--panel-2:#f6f7fb;--text:#171722;--muted:#5c5c6e;--line:#e7e8ef;
    --ind:#6366f1;--vio:#8b5cf6;--teal:#14b8a6;--grad:linear-gradient(120deg,#6366f1,#8b5cf6,#14b8a6);
    --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--display:'Space Grotesk',var(--font);
    --shadow:0 10px 30px -16px rgba(20,20,45,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--panel-2);-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--display);margin:0;letter-spacing:-.02em}
  a{color:var(--ind)}
  button{font-family:var(--font);cursor:pointer}
  .hidden{display:none!important}
  .btn{display:inline-flex;align-items:center;gap:.5em;font-weight:600;font-size:.92rem;padding:.6em 1.1em;border-radius:10px;border:1px solid transparent;background:var(--grad);color:#fff}
  .btn.ghost{background:#fff;border-color:var(--line);color:var(--text)}
  .btn.sm{padding:.45em .8em;font-size:.85rem}
  input,select{width:100%;padding:.6em .7em;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:.92rem;background:#fff;color:var(--text)}
  label{font-size:.82rem;font-weight:600;display:block;margin-bottom:5px}

  /* Login */
  #login{min-height:100vh;display:grid;place-items:center;background:var(--bg);
    background-image:radial-gradient(60% 55% at 80% 10%,rgba(139,92,246,.28),transparent 60%),radial-gradient(50% 50% at 10% 90%,rgba(20,184,166,.2),transparent 60%);padding:24px}
  .login-card{width:100%;max-width:400px;background:#fff;border-radius:18px;padding:32px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:.5em;font-family:var(--display);font-weight:700;font-size:1.25rem}
  .brand svg{width:30px;height:30px}
  .login-card h2{font-size:1.3rem;margin:18px 0 4px}
  .login-card p.sub{color:var(--muted);font-size:.9rem;margin:0 0 20px}
  .field{margin-bottom:14px}
  .oauth{display:grid;gap:10px;margin-top:6px}
  .oauth a{display:flex;align-items:center;justify-content:center;gap:.6em;border:1px solid var(--line);border-radius:10px;padding:.65em;text-decoration:none;color:var(--text);font-weight:600;font-size:.9rem;background:#fff}
  .oauth a:hover{border-color:var(--ind)}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.8rem;margin:16px 0}
  .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}
  .err{color:#c0392b;font-size:.85rem;margin-top:10px;min-height:1em}
  .apibar{margin-top:16px;font-size:.78rem;color:var(--muted)}
  .apibar input{font-size:.8rem;padding:.4em .6em;margin-top:4px}

  /* App shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  aside{background:var(--bg);color:#fff;padding:20px 14px;position:sticky;top:0;height:100vh}
  aside .brand{color:#fff;padding:0 8px 18px}
  nav.side a{display:flex;align-items:center;gap:.6em;color:rgba(255,255,255,.75);text-decoration:none;padding:.6em .8em;border-radius:9px;font-size:.92rem;font-weight:500;margin-bottom:2px}
  nav.side a:hover{background:rgba(255,255,255,.07);color:#fff}
  nav.side a.active{background:var(--grad);color:#fff}
  main{padding:24px clamp(16px,3vw,32px);overflow:auto;max-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .topbar h1{font-size:1.5rem}
  .topbar .right{display:flex;align-items:center;gap:10px}
  .who{font-size:.85rem;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .k{font-size:.8rem;color:var(--muted);font-weight:600}
  .card .v{font-family:var(--display);font-size:1.8rem;font-weight:700;margin-top:4px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px}
  .panel h3{font-size:1.05rem;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:600;background:rgba(99,102,241,.12);color:var(--ind)}
  .muted{color:var(--muted)}
  .row-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end;margin-bottom:14px}
  .banner{background:#fff8e1;border:1px solid #f0d98a;color:#7a5b00;border-radius:10px;padding:12px 14px;font-size:.86rem;margin-bottom:18px}
  .empty{color:var(--muted);font-size:.9rem;padding:14px 0}
  @media(max-width:820px){#app{grid-template-columns:1fr}aside{position:static;height:auto}main{max-height:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <div class="login-card">
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="100" y2="100"><stop offset="0" stop-color="#6366f1"/><stop offset=".5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#14b8a6"/></linearGradient></defs><path d="M50 6 89 28V72L50 94 11 72V28Z" stroke="url(#g)" stroke-width="7" stroke-linejoin="round"/><path d="M50 30 68 40V60L50 70 32 60V40Z" fill="url(#g)"/></svg>
      Websix
    </div>
    <h2>Admin sign in</h2>
    <p class="sub">Secure access to your agency command center.</p>
    <form id="loginForm">
      <div class="field"><label for="email">Email</label><input id="email" type="email" required placeholder="you@websix.site"></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" required placeholder="••••••••"></div>
      <button class="btn" type="submit" style="width:100%;justify-content:center">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
    <div class="divider">or continue with</div>
    <div class="oauth" id="oauthBtns">
      <a data-provider="google" href="#">Continue with Google</a>
      <a data-provider="github" href="#">Continue with GitHub</a>
      <a data-provider="microsoft" href="#">Continue with Microsoft</a>
    </div>
    <div class="apibar">
      <label for="apiBase">Backend API URL</label>
      <input id="apiBase" type="text" placeholder="https://api.websix.site">
    </div>
  </div>
</section>

<!-- APP -->
<section id="app" class="hidden">
  <aside>
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M50 6 89 28V72L50 94 11 72V28Z" stroke="url(#g)" stroke-width="7" stroke-linejoin="round"/><path d="M50 30 68 40V60L50 70 32 60V40Z" fill="url(#g)"/></svg>
      Websix
    </div>
    <nav class="side" id="nav">
      <a data-view="overview" class="active">📊 Overview</a>
      <a data-view="leads">🎯 Leads</a>
      <a data-view="clients">🏢 Clients</a>
      <a data-view="projects">📁 Projects</a>
      <a data-view="quotes">📝 Quotes</a>
      <a data-view="invoices">💳 Invoices</a>
      <a data-view="activity">🔔 Activity</a>
      <a data-view="search">🔍 Search</a>
    </nav>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="viewTitle">Overview</h1>
      <div class="right">
        <span class="who" id="who"></span>
        <button class="btn ghost sm" id="refreshBtn">Refresh</button>
        <button class="btn ghost sm" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</section>

<script>
(function(){
  var LS_TOKEN='websix_admin_token', LS_API='websix_admin_api';
  var state={ token:null, api:'', user:null, view:'overview' };

  // --- boot: OAuth token in hash, or stored token ---
  function readHashToken(){
    if(location.hash.indexOf('token=')>-1){
      var t=new URLSearchParams(location.hash.slice(1)).get('token');
      if(t){ localStorage.setItem(LS_TOKEN,t); history.replaceState(null,'',location.pathname); return t; }
    }
    return null;
  }
  state.api = localStorage.getItem(LS_API) || '';
  state.token = readHashToken() || localStorage.getItem(LS_TOKEN);
  document.getElementById('apiBase').value = state.api;

  // --- API helper ---
  async function api(path, opts){
    opts=opts||{};
    if(!state.api) throw new Error('Set your backend API URL first.');
    var headers=Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    if(state.token) headers['Authorization']='Bearer '+state.token;
    var res=await fetch(state.api.replace(/\/$/,'')+path,{method:opts.method||'GET',headers,body:opts.body?JSON.stringify(opts.body):undefined});
    if(res.status===401){ logout(); throw new Error('Session expired — please sign in again.'); }
    var data=null; try{ data=await res.json(); }catch(e){}
    if(!res.ok) throw new Error((data&&data.error)||('HTTP '+res.status));
    return data;
  }

  // --- auth ---
  document.getElementById('apiBase').addEventListener('change', function(e){ state.api=e.target.value.trim(); localStorage.setItem(LS_API,state.api); });
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var err=document.getElementById('loginErr'); err.textContent='';
    state.api=(document.getElementById('apiBase').value||'').trim(); localStorage.setItem(LS_API,state.api);
    if(!state.api){ err.textContent='Enter your backend API URL first.'; return; }
    try{
      var r=await api('/api/auth/login',{method:'POST',body:{email:document.getElementById('email').value,password:document.getElementById('password').value}});
      state.token=r.token; state.user=r.user; localStorage.setItem(LS_TOKEN,r.token);
      showApp();
    }catch(ex){ err.textContent=ex.message||'Sign in failed'; }
  });
  document.querySelectorAll('#oauthBtns a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var apiUrl=(document.getElementById('apiBase').value||'').trim();
      if(!apiUrl){ document.getElementById('loginErr').textContent='Enter your backend API URL first.'; return; }
      localStorage.setItem(LS_API,apiUrl);
      window.location.href=apiUrl.replace(/\/$/,'')+'/api/auth/oauth/'+a.getAttribute('data-provider')+'/start';
    });
  });
  function logout(){ state.token=null; state.user=null; localStorage.removeItem(LS_TOKEN); document.getElementById('app').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); }
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('refreshBtn').addEventListener('click', function(){ renderView(state.view); });

  // --- nav ---
  document.querySelectorAll('#nav a').forEach(function(a){
    a.addEventListener('click', function(){
      document.querySelectorAll('#nav a').forEach(function(x){x.classList.remove('active');});
      a.classList.add('active'); state.view=a.getAttribute('data-view'); renderView(state.view);
    });
  });

  async function showApp(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    try{ if(!state.user) state.user=await api('/api/auth/me'); document.getElementById('who').textContent=(state.user&&(state.user.email||''))||''; }catch(e){}
    renderView(state.view);
  }

  // --- rendering ---
  var C=document.getElementById('content'), T=document.getElementById('viewTitle');
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function table(cols, rows){
    if(!rows||!rows.length) return '<div class="empty">Nothing here yet.</div>';
    var h='<div style="overflow:auto"><table><thead><tr>'+cols.map(function(c){return '<th>'+esc(c.label)+'</th>';}).join('')+'</tr></thead><tbody>';
    h+=rows.map(function(r){return '<tr>'+cols.map(function(c){var v=c.get?c.get(r):r[c.key];return '<td>'+(c.raw?v:esc(v==null?'':v))+'</td>';}).join('')+'</tr>';}).join('');
    return h+'</tbody></table></div>';
  }
  function money(n){return '$'+(Number(n)||0).toLocaleString('en-US');}

  async function renderView(v){
    T.textContent=({overview:'Overview',leads:'Leads',clients:'Clients',projects:'Projects',quotes:'Quotes',invoices:'Invoices',activity:'Activity',search:'Search'})[v]||v;
    C.innerHTML='<div class="empty">Loading…</div>';
    try{
      if(v==='overview') return renderOverview();
      if(v==='leads') return renderLeads();
      if(v==='clients') return renderSimple('/api/admin/clients',[{key:'business_name',label:'Business'},{key:'email',label:'Email'},{key:'phone',label:'Phone'},{key:'created_at',label:'Added'}]);
      if(v==='projects') return renderSimple('/api/admin/projects',[{key:'public_id',label:'Ref'},{key:'type',label:'Type'},{key:'status',label:'Status',raw:true,get:function(r){return '<span class="pill">'+esc(r.status)+'</span>';}},{key:'tier',label:'Tier'},{key:'estimate_low',label:'Estimate',get:function(r){return r.estimate_low?money(r.estimate_low):'';}},{key:'created_at',label:'Created'}]);
      if(v==='quotes') return renderSimple('/api/admin/quotes',[{key:'project_id',label:'Project'},{key:'amount',label:'Amount',get:function(r){return money(r.amount);}},{key:'status',label:'Status'},{key:'created_at',label:'Created'}]);
      if(v==='invoices') return renderInvoices();
      if(v==='activity') return renderSimple('/api/admin/activities',[{key:'type',label:'Type'},{key:'message',label:'Message'},{key:'created_at',label:'When'}]);
      if(v==='search') return renderSearch();
    }catch(ex){ C.innerHTML='<div class="banner">'+esc(ex.message)+'</div>'; }
  }

  async function renderOverview(){
    var o=await api('/api/admin/overview');
    var cards=[['Leads',o.leads],['Clients',o.clients],['Projects',o.projects],['Quote requests',o.quotesRequested],['Unpaid invoices',o.unpaidInvoices],['Revenue',money(o.revenue)]];
    var h='<div class="cards">'+cards.map(function(c){return '<div class="card"><div class="k">'+c[0]+'</div><div class="v">'+esc(c[1])+'</div></div>';}).join('')+'</div>';
    h+='<div class="panel"><h3>Recent activity</h3>'+table([{key:'type',label:'Type'},{key:'message',label:'Message'},{key:'created_at',label:'When'}], o.recentActivity||[])+'</div>';
    C.innerHTML=h;
  }
  async function renderSimple(path, cols){
    var rows=await api(path);
    C.innerHTML='<div class="panel">'+table(cols, rows)+'</div>';
  }
  async function renderLeads(){
    C.innerHTML='<div class="panel"><h3>Add a lead</h3><div class="row-form">'
      +'<div><label>Business</label><input id="l_name"></div>'
      +'<div><label>Category</label><input id="l_cat"></div>'
      +'<div><label>City</label><input id="l_city"></div>'
      +'<div><label>Phone</label><input id="l_phone"></div>'
      +'<div><button class="btn sm" id="l_add">Add lead</button></div></div><div class="err" id="l_err"></div></div>'
      +'<div class="panel" id="l_list"><div class="empty">Loading…</div></div>';
    document.getElementById('l_add').addEventListener('click', async function(){
      var name=document.getElementById('l_name').value.trim(); if(!name){document.getElementById('l_err').textContent='Business name required';return;}
      try{ await api('/api/admin/leads',{method:'POST',body:{business_name:name,category:document.getElementById('l_cat').value,city:document.getElementById('l_city').value,phone:document.getElementById('l_phone').value}}); renderLeads(); }
      catch(ex){ document.getElementById('l_err').textContent=ex.message; }
    });
    var rows=await api('/api/admin/leads');
    document.getElementById('l_list').innerHTML=table([{key:'business_name',label:'Business'},{key:'category',label:'Category'},{key:'city',label:'City'},{key:'phone',label:'Phone'},{key:'website_status',label:'Website'},{key:'score',label:'Score'},{key:'priority',label:'Priority'}], rows);
  }
  async function renderInvoices(){
    C.innerHTML='<div class="panel"><h3>Create an invoice</h3><div class="row-form">'
      +'<div><label>Project ID (internal)</label><input id="i_pid"></div>'
      +'<div><label>Amount (USD)</label><input id="i_amt" type="number"></div>'
      +'<div><button class="btn sm" id="i_add">Create invoice</button></div></div>'
      +'<div class="muted" style="font-size:.8rem">Creating an invoice emails the client and you. Use the internal project id from the Projects tab.</div><div class="err" id="i_err"></div></div>'
      +'<div class="panel" id="i_list"><div class="empty">Loading…</div></div>';
    document.getElementById('i_add').addEventListener('click', async function(){
      var pid=document.getElementById('i_pid').value.trim(), amt=Number(document.getElementById('i_amt').value);
      if(!pid||!amt){document.getElementById('i_err').textContent='Project id and amount required';return;}
      try{ await api('/api/admin/invoices',{method:'POST',body:{projectId:pid,amount:amt}}); renderInvoices(); }
      catch(ex){ document.getElementById('i_err').textContent=ex.message; }
    });
    var rows=await api('/api/admin/invoices');
    document.getElementById('i_list').innerHTML=table([{key:'project_id',label:'Project'},{key:'amount',label:'Amount',get:function(r){return money(r.amount);}},{key:'status',label:'Status',raw:true,get:function(r){return '<span class="pill">'+esc(r.status)+'</span>';}},{key:'created_at',label:'Created'}], rows);
  }
  async function renderSearch(){
    C.innerHTML='<div class="panel"><div class="row-form"><div style="flex:1"><label>Search clients, projects, leads</label><input id="s_q" placeholder="Type and press Enter"></div></div><div id="s_res"></div></div>';
    var input=document.getElementById('s_q'); input.focus();
    input.addEventListener('keydown', async function(e){ if(e.key!=='Enter')return; var q=input.value.trim(); if(!q)return;
      document.getElementById('s_res').innerHTML='<div class="empty">Searching…</div>';
      try{ var r=await api('/api/admin/search?q='+encodeURIComponent(q));
        document.getElementById('s_res').innerHTML=
          '<h3 style="margin:14px 0 8px">Clients</h3>'+table([{key:'business_name',label:'Business'},{key:'email',label:'Email'}],r.clients)
          +'<h3 style="margin:16px 0 8px">Projects</h3>'+table([{key:'public_id',label:'Ref'},{key:'status',label:'Status'},{key:'summary',label:'Summary'}],r.projects)
          +'<h3 style="margin:16px 0 8px">Leads</h3>'+table([{key:'business_name',label:'Business'},{key:'city',label:'City'}],r.leads);
      }catch(ex){ document.getElementById('s_res').innerHTML='<div class="banner">'+esc(ex.message)+'</div>'; }
    });
  }

  // --- start ---
  if(state.token){ showApp(); }
  else {
    document.getElementById('login').classList.remove('hidden');
    if(!state.api){ document.getElementById('loginErr').textContent=''; }
  }
})();
</script>
</body>
</html>
