<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Websix — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0b12;--ink:#12121c;--panel:#fff;--panel-2:#f6f7fb;--text:#171722;--muted:#5c5c6e;--line:#e7e8ef;
    --ind:#6366f1;--vio:#8b5cf6;--teal:#14b8a6;--grad:linear-gradient(120deg,#6366f1,#8b5cf6,#14b8a6);
    --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--display:'Space Grotesk',var(--font);
    --shadow:0 10px 30px -16px rgba(20,20,45,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--text);background:var(--panel-2);-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--display);margin:0;letter-spacing:-.02em}
  a{color:var(--ind)}
  button{font-family:var(--font);cursor:pointer}
  .hidden{display:none!important}
  .btn{display:inline-flex;align-items:center;gap:.5em;font-weight:600;font-size:.92rem;padding:.6em 1.1em;border-radius:10px;border:1px solid transparent;background:var(--grad);color:#fff}
  .btn.ghost{background:#fff;border-color:var(--line);color:var(--text)}
  .btn.sm{padding:.45em .8em;font-size:.85rem}
  input,select{width:100%;padding:.6em .7em;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:.92rem;background:#fff;color:var(--text)}
  label{font-size:.82rem;font-weight:600;display:block;margin-bottom:5px}

  /* Login */
  #login{min-height:100vh;display:grid;place-items:center;background:var(--bg);
    background-image:radial-gradient(60% 55% at 80% 10%,rgba(139,92,246,.28),transparent 60%),radial-gradient(50% 50% at 10% 90%,rgba(20,184,166,.2),transparent 60%);padding:24px}
  .login-card{width:100%;max-width:400px;background:#fff;border-radius:18px;padding:32px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:.5em;font-family:var(--display);font-weight:700;font-size:1.25rem}
  .brand svg{width:30px;height:30px}
  .login-card h2{font-size:1.3rem;margin:18px 0 4px}
  .login-card p.sub{color:var(--muted);font-size:.9rem;margin:0 0 20px}
  .field{margin-bottom:14px}
  .oauth{display:grid;gap:10px;margin-top:6px}
  .oauth a{display:flex;align-items:center;justify-content:center;gap:.6em;border:1px solid var(--line);border-radius:10px;padding:.65em;text-decoration:none;color:var(--text);font-weight:600;font-size:.9rem;background:#fff}
  .oauth a:hover{border-color:var(--ind)}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.8rem;margin:16px 0}
  .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}
  .err{color:#c0392b;font-size:.85rem;margin-top:10px;min-height:1em}
  .apibar{margin-top:16px;font-size:.78rem;color:var(--muted)}
  .apibar input{font-size:.8rem;padding:.4em .6em;margin-top:4px}

  /* App shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  aside{background:var(--bg);color:#fff;padding:20px 14px;position:sticky;top:0;height:100vh}
  aside .brand{color:#fff;padding:0 8px 18px}
  nav.side a{display:flex;align-items:center;gap:.6em;color:rgba(255,255,255,.75);text-decoration:none;padding:.6em .8em;border-radius:9px;font-size:.92rem;font-weight:500;margin-bottom:2px}
  nav.side a:hover{background:rgba(255,255,255,.07);color:#fff}
  nav.side a.active{background:var(--grad);color:#fff}
  main{padding:24px clamp(16px,3vw,32px);overflow:auto;max-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .topbar h1{font-size:1.5rem}
  .topbar .right{display:flex;align-items:center;gap:10px}
  .who{font-size:.85rem;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .k{font-size:.8rem;color:var(--muted);font-weight:600}
  .card .v{font-family:var(--display);font-size:1.8rem;font-weight:700;margin-top:4px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px}
  .panel h3{font-size:1.05rem;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:600;background:rgba(99,102,241,.12);color:var(--ind)}
  .muted{color:var(--muted)}
  .row-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end;margin-bottom:14px}
  .banner{background:#fff8e1;border:1px solid #f0d98a;color:#7a5b00;border-radius:10px;padding:12px 14px;font-size:.86rem;margin-bottom:18px}
  .empty{color:var(--muted);font-size:.9rem;padding:14px 0}
  @media(max-width:820px){#app{grid-template-columns:1fr}aside{position:static;height:auto}main{max-height:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <div class="login-card">
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="100" y2="100"><stop offset="0" stop-color="#6366f1"/><stop offset=".5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#14b8a6"/></linearGradient></defs><path d="M50 6 89 28V72L50 94 11 72V28Z" stroke="url(#g)" stroke-width="7" stroke-linejoin="round"/><path d="M50 30 68 40V60L50 70 32 60V40Z" fill="url(#g)"/></svg>
      Websix
    </div>
    <h2>Admin sign in</h2>
    <p class="sub">Secure access to your agency command center.</p>
    <form id="loginForm">
      <div class="field"><label for="email">Email</label><input id="email" type="email" required placeholder="you@websix.site"></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" required placeholder="••••••••"></div>
      <button class="btn" type="submit" style="width:100%;justify-content:center">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
    <div class="divider hidden">or continue with</div>
    <div class="oauth hidden" id="oauthBtns">
      <a data-provider="google" href="#">Continue with Google</a>
      <a data-provider="github" href="#">Continue with GitHub</a>
      <a data-provider="microsoft" href="#">Continue with Microsoft</a>
    </div>
    <div class="apibar">
      <label for="apiBase">Backend API URL</label>
      <input id="apiBase" type="text" placeholder="https://websix-backend.onsoti777.workers.dev">
    </div>
    <!-- Admin is pre-provisioned and locked to the owner; public signup is disabled. -->
  </div>
</section>

<!-- APP -->
<section id="app" class="hidden">
  <aside>
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M50 6 89 28V72L50 94 11 72V28Z" stroke="url(#g)" stroke-width="7" stroke-linejoin="round"/><path d="M50 30 68 40V60L50 70 32 60V40Z" fill="url(#g)"/></svg>
      Websix
    </div>
    <nav class="side" id="nav">
      <a data-view="overview" class="active">📊 Overview</a>
      <a data-view="leads">🎯 Leads</a>
      <a data-view="clients">🏢 Clients</a>
      <a data-view="projects">📁 Projects</a>
      <a data-view="quotes">📝 Quotes</a>
      <a data-view="invoices">💳 Invoices</a>
      <a data-view="activity">🔔 Activity</a>
      <a data-view="search">🔍 Search</a>
    </nav>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="viewTitle">Overview</h1>
      <div class="right">
        <span class="who" id="who"></span>
        <button class="btn ghost sm" id="refreshBtn">Refresh</button>
        <button class="btn ghost sm" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</section>

<script>
(function(){
  var LS_TOKEN='websix_admin_token', LS_API='websix_admin_api';
  var state={ token:null, api:'', user:null, view:'overview' };
  // Storage helpers that never throw (sandboxed previews block localStorage; live site is fine).
  var _mem={};
  var _LS=null; try{ _LS=window.localStorage; _LS.getItem('__probe'); }catch(e){ _LS=null; }
  function lsGet(k){ try{ return _LS?_LS.getItem(k):(_mem[k]||null); }catch(e){ return _mem[k]||null; } }
  function lsSet(k,v){ try{ if(_LS)_LS.setItem(k,v); else _mem[k]=v; }catch(e){ _mem[k]=v; } }
  function lsRemove(k){ try{ if(_LS)_LS.removeItem(k); else delete _mem[k]; }catch(e){ delete _mem[k]; } }

  // --- boot: OAuth token in hash, or stored token ---
  function readHashToken(){
    if(location.hash.indexOf('token=')>-1){
      var t=new URLSearchParams(location.hash.slice(1)).get('token');
      if(t){ lsSet(LS_TOKEN,t); history.replaceState(null,'',location.pathname); return t; }
    }
    return null;
  }
  state.api = lsGet(LS_API) || 'https://websix-backend.onsoti777.workers.dev';
  state.token = readHashToken() || lsGet(LS_TOKEN);
  document.getElementById('apiBase').value = state.api;

  // --- API helper ---
  async function api(path, opts){
    opts=opts||{};
    if(!state.api) throw new Error('Set your backend API URL first.');
    var headers=Object.assign({'Content-Type':'application/json'}, opts.headers||{});
    if(state.token) headers['Authorization']='Bearer '+state.token;
    var res=await fetch(state.api.replace(/\/$/,'')+path,{method:opts.method||'GET',headers,body:opts.body?JSON.stringify(opts.body):undefined});
    if(res.status===401){ logout(); throw new Error('Session expired — please sign in again.'); }
    var data=null; try{ data=await res.json(); }catch(e){}
    if(!res.ok) throw new Error((data&&data.error)||('HTTP '+res.status));
    return data;
  }

  // --- auth ---
  document.getElementById('apiBase').addEventListener('change', function(e){ state.api=e.target.value.trim(); lsSet(LS_API,state.api); });
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var err=document.getElementById('loginErr'); err.textContent='';
    state.api=(document.getElementById('apiBase').value||'').trim(); lsSet(LS_API,state.api);
    if(!state.api){ err.textContent='Enter your backend API URL first.'; return; }
    try{
      var r=await api('/api/auth/login',{method:'POST',body:{email:document.getElementById('email').value,password:document.getElementById('password').value}});
      state.token=r.token; state.user=r.user; lsSet(LS_TOKEN,r.token);
      showApp();
    }catch(ex){ err.textContent=ex.message||'Sign in failed'; }
  });
  document.querySelectorAll('#oauthBtns a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var apiUrl=(document.getElementById('apiBase').value||'').trim();
      if(!apiUrl){ document.getElementById('loginErr').textContent='Enter your backend API URL first.'; return; }
      lsSet(LS_API,apiUrl);
      window.location.href=apiUrl.replace(/\/$/,'')+'/api/auth/oauth/'+a.getAttribute('data-provider')+'/start';
    });
  });
  function logout(){ state.token=null; state.user=null; lsRemove(LS_TOKEN); document.getElementById('app').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); }
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('refreshBtn').addEventListener('click', function(){ renderView(state.view); });

  // --- nav ---
  document.querySelectorAll('#nav a').forEach(function(a){
    a.addEventListener('click', function(){
      document.querySelectorAll('#nav a').forEach(function(x){x.classList.remove('active');});
      a.classList.add('active'); state.view=a.getAttribute('data-view'); renderView(state.view);
    });
  });

  async function showApp(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    try{ if(!state.user) state.user=await api('/api/auth/me'); document.getElementById('who').textContent=(state.user&&(state.user.email||''))||''; }catch(e){}
    renderView(state.view);
  }

  // --- rendering ---
  var C=document.getElementById('content'), T=document.getElementById('viewTitle');
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function table(cols, rows){
    if(!rows||!rows.length) return '<div class="empty">Nothing here yet.</div>';
    var h='<div style="overflow:auto"><table><thead><tr>'+cols.map(function(c){return '<th>'+esc(c.label)+'</th>';}).join('')+'</tr></thead><tbody>';
    h+=rows.map(function(r){return '<tr>'+cols.map(function(c){var v=c.get?c.get(r):r[c.key];return '<td>'+(c.raw?v:esc(v==null?'':v))+'</td>';}).join('')+'</tr>';}).join('');
    return h+'</tbody></table></div>';
  }
  function money(n){return '$'+(Number(n)||0).toLocaleString('en-US');}

  async function renderView(v){
    T.textContent=({overview:'Overview',leads:'Leads',clients:'Clients',projects:'Projects',quotes:'Quotes',invoices:'Invoices',activity:'Activity',search:'Search'})[v]||v;
    C.innerHTML='<div class="empty">Loading…</div>';
    try{
      if(v==='overview') return renderOverview();
      if(v==='leads') return renderLeads();
      if(v==='clients') return renderSimple('/api/admin/clients',[{key:'business_name',label:'Business'},{key:'email',label:'Email'},{key:'phone',label:'Phone'},{key:'created_at',label:'Added'}]);
      if(v==='projects') return renderProjects();
      if(v==='quotes') return renderSimple('/api/admin/quotes',[{key:'project_id',label:'Project'},{key:'amount',label:'Amount',get:function(r){return money(r.amount);}},{key:'status',label:'Status'},{key:'created_at',label:'Created'}]);
      if(v==='invoices') return renderInvoices();
      if(v==='activity') return renderSimple('/api/admin/activities',[{key:'type',label:'Type'},{key:'message',label:'Message'},{key:'created_at',label:'When'}]);
      if(v==='search') return renderSearch();
    }catch(ex){ C.innerHTML='<div class="banner">'+esc(ex.message)+'</div>'; }
  }

  async function renderOverview(){
    var o=await api('/api/admin/overview');
    var cards=[['Leads',o.leads],['Clients',o.clients],['Projects',o.projects],['Quote requests',o.quotesRequested],['Unpaid invoices',o.unpaidInvoices],['Revenue',money(o.revenue)]];
    var h='<div class="cards">'+cards.map(function(c){return '<div class="card"><div class="k">'+c[0]+'</div><div class="v">'+esc(c[1])+'</div></div>';}).join('')+'</div>';
    h+='<div class="panel"><h3>Recent activity</h3>'+table([{key:'type',label:'Type'},{key:'message',label:'Message'},{key:'created_at',label:'When'}], o.recentActivity||[])+'</div>';
    C.innerHTML=h;
  }
  async function renderSimple(path, cols){
    var rows=await api(path);
    C.innerHTML='<div class="panel">'+table(cols, rows)+'</div>';
  }
  async function renderLeads(){
    C.innerHTML='<div class="panel"><h3>Add a lead</h3><div class="row-form">'
      +'<div><label>Business</label><input id="l_name"></div>'
      +'<div><label>Category</label><input id="l_cat"></div>'
      +'<div><label>City</label><input id="l_city"></div>'
      +'<div><label>Phone</label><input id="l_phone"></div>'
      +'<div><button class="btn sm" id="l_add">Add lead</button></div></div><div class="err" id="l_err"></div></div>'
      +'<div class="panel" id="l_list"><div class="empty">Loading…</div></div>';
    document.getElementById('l_add').addEventListener('click', async function(){
      var name=document.getElementById('l_name').value.trim(); if(!name){document.getElementById('l_err').textContent='Business name required';return;}
      try{ await api('/api/admin/leads',{method:'POST',body:{business_name:name,category:document.getElementById('l_cat').value,city:document.getElementById('l_city').value,phone:document.getElementById('l_phone').value}}); renderLeads(); }
      catch(ex){ document.getElementById('l_err').textContent=ex.message; }
    });
    var rows=await api('/api/admin/leads');
    document.getElementById('l_list').innerHTML=table([{key:'business_name',label:'Business'},{key:'category',label:'Category'},{key:'city',label:'City'},{key:'phone',label:'Phone'},{key:'website_status',label:'Website'},{key:'score',label:'Score'},{key:'priority',label:'Priority'}], rows);
  }
  async function renderInvoices(){
    C.innerHTML='<div class="panel"><h3>Create an invoice</h3><div class="row-form">'
      +'<div><label>Project ID (internal)</label><input id="i_pid"></div>'
      +'<div><label>Amount (USD)</label><input id="i_amt" type="number"></div>'
      +'<div><button class="btn sm" id="i_add">Create invoice</button></div></div>'
      +'<div class="muted" style="font-size:.8rem">Creating an invoice emails the client and you. Use the internal project id from the Projects tab.</div><div class="err" id="i_err"></div></div>'
      +'<div class="panel" id="i_list"><div class="empty">Loading…</div></div>';
    document.getElementById('i_add').addEventListener('click', async function(){
      var pid=document.getElementById('i_pid').value.trim(), amt=Number(document.getElementById('i_amt').value);
      if(!pid||!amt){document.getElementById('i_err').textContent='Project id and amount required';return;}
      try{ await api('/api/admin/invoices',{method:'POST',body:{projectId:pid,amount:amt}}); renderInvoices(); }
      catch(ex){ document.getElementById('i_err').textContent=ex.message; }
    });
    var rows=await api('/api/admin/invoices');
    document.getElementById('i_list').innerHTML=table([{key:'project_id',label:'Project'},{key:'amount',label:'Amount',get:function(r){return money(r.amount);}},{key:'status',label:'Status',raw:true,get:function(r){return '<span class="pill">'+esc(r.status)+'</span>';}},{key:'created_at',label:'Created'}], rows);
  }
  async function renderSearch(){
    C.innerHTML='<div class="panel"><div class="row-form"><div style="flex:1"><label>Search clients, projects, leads</label><input id="s_q" placeholder="Type and press Enter"></div></div><div id="s_res"></div></div>';
    var input=document.getElementById('s_q'); input.focus();
    input.addEventListener('keydown', async function(e){ if(e.key!=='Enter')return; var q=input.value.trim(); if(!q)return;
      document.getElementById('s_res').innerHTML='<div class="empty">Searching…</div>';
      try{ var r=await api('/api/admin/search?q='+encodeURIComponent(q));
        document.getElementById('s_res').innerHTML=
          '<h3 style="margin:14px 0 8px">Clients</h3>'+table([{key:'business_name',label:'Business'},{key:'email',label:'Email'}],r.clients)
          +'<h3 style="margin:16px 0 8px">Projects</h3>'+table([{key:'public_id',label:'Ref'},{key:'status',label:'Status'},{key:'summary',label:'Summary'}],r.projects)
          +'<h3 style="margin:16px 0 8px">Leads</h3>'+table([{key:'business_name',label:'Business'},{key:'city',label:'City'}],r.leads);
      }catch(ex){ document.getElementById('s_res').innerHTML='<div class="banner">'+esc(ex.message)+'</div>'; }
    });
  }

  // --- project workspace ---
  var STATUS_WORKFLOW=["New Lead","Quote Submitted","Quote Under Review","Proposal Sent","Proposal Revision","Proposal Approved","Contract Sent","Contract Signed","Deposit Pending","Deposit Paid","Planning","Design","Development","Internal Testing","Client Review","Revision 1","Revision 2","Final Approval","Final Payment Pending","Final Payment Received","Ready for Launch","Website Launched","Training","Project Delivered","Maintenance Active","Completed"];
  var EMAIL_TEMPLATES={
    welcome:{s:"Welcome to Websix",b:"Hi {name},\n\nThank you for choosing Websix! We're excited to build your website. Here's what happens next: we'll confirm your requirements, send your proposal, and get started once approved.\n\nBest,\nThe Websix team"},
    "follow-up":{s:"Following up on your project",b:"Hi {name},\n\nJust following up on your website project. Do you have any questions, or shall we proceed to the next step?\n\nBest,\nThe Websix team"},
    proposal:{s:"Your Websix proposal",b:"Hi {name},\n\nYour proposal is ready. It covers scope, timeline, deliverables and pricing. Let me know if you'd like any changes.\n\nBest,\nThe Websix team"},
    invoice:{s:"Your Websix invoice",b:"Hi {name},\n\nYour invoice is ready. You can pay securely online — details to follow. Thank you!\n\nBest,\nThe Websix team"},
    update:{s:"Project update",b:"Hi {name},\n\nA quick update on your website project: we're making good progress and will share the next milestone shortly.\n\nBest,\nThe Websix team"},
    launch:{s:"Your website is live!",b:"Hi {name},\n\nGreat news — your website is now live! Take a look and let us know what you think.\n\nBest,\nThe Websix team"}
  };
  var CURRENT_WS=null, CURRENT_WS_CLIENT_NAME='there';
  function wsVal(id){ var e=document.getElementById(id); return e?e.value:''; }

  async function renderProjects(){
    var rows=await api('/api/admin/projects');
    var h='<div class="panel"><h3>Projects <span class="muted" style="font-weight:400;font-size:.85rem">— click a row to open its workspace</span></h3>';
    if(!rows.length){ h+='<div class="empty">No projects yet.</div></div>'; C.innerHTML=h; return; }
    h+='<div style="overflow:auto"><table><thead><tr><th>Ref</th><th>Client</th><th>Type</th><th>Status</th><th>Estimate</th><th>Created</th></tr></thead><tbody>';
    h+=rows.map(function(r){ return '<tr style="cursor:pointer" data-ws="'+esc(r.public_id)+'"><td><b>'+esc(r.public_id)+'</b></td><td>'+esc(r.summary?'' : '')+'</td><td>'+esc(r.type)+'</td><td><span class="pill">'+esc(r.status)+'</span></td><td>'+(r.estimate_low?money(r.estimate_low):'')+'</td><td>'+esc((r.created_at||'').slice(0,10))+'</td></tr>'; }).join('');
    h+='</tbody></table></div></div>';
    C.innerHTML=h;
    C.querySelectorAll('[data-ws]').forEach(function(tr){ tr.addEventListener('click',function(){ openWorkspace(tr.getAttribute('data-ws')); }); });
  }

  async function openWorkspace(ref){
    T.textContent='Project '+ref;
    C.innerHTML='<div class="empty">Loading workspace…</div>';
    try{ var w=await api('/api/admin/projects/'+encodeURIComponent(ref)+'/workspace'); renderWorkspace(w); }
    catch(ex){ C.innerHTML='<div class="banner">'+esc(ex.message)+'</div>'; }
  }

  function renderWorkspace(w){
    var p=w.project, c=w.client||{}, ref=p.public_id; CURRENT_WS=ref;
    var data={}; try{ data=JSON.parse(p.data||'{}'); }catch(e){} var f=data.fields||{};
    CURRENT_WS_CLIENT_NAME=c.contact_name||c.business_name||f.contact_name||f.biz_name||'there';
    var idx=STATUS_WORKFLOW.indexOf(p.status); var pct=idx>=0?Math.round((idx+1)/STATUS_WORKFLOW.length*100):0;
    var budget=p.estimate_low||0, paid=w.paid||0, bal=budget-paid;
    var statusOpts=STATUS_WORKFLOW.map(function(s){return '<option'+(s===p.status?' selected':'')+'>'+esc(s)+'</option>';}).join('');
    var h='';
    h+='<button class="btn ghost sm" id="wsBack">← All projects</button>';
    h+='<div class="panel" style="margin-top:12px"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center">'
      +'<div><h3 style="margin:0">'+esc(c.business_name||f.biz_name||'Project')+' <span class="muted">'+esc(ref)+'</span></h3><div class="muted" style="font-size:.85rem">'+esc(p.type||'')+' · created '+esc((p.created_at||'').slice(0,10))+'</div></div>'
      +'<div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap"><div><label style="font-size:.75rem">Status</label><select id="wsStatus">'+statusOpts+'</select></div><div><label style="font-size:.75rem">or custom</label><input id="wsStatusCustom" placeholder="custom…" style="width:120px"></div><button class="btn sm" id="wsStatusBtn">Update</button></div>'
      +'</div></div>';
    h+='<div class="cards">'
      +'<div class="card"><div class="k">Progress</div><div class="v">'+pct+'%</div></div>'
      +'<div class="card"><div class="k">Budget (est.)</div><div class="v">'+money(budget)+'</div></div>'
      +'<div class="card"><div class="k">Paid</div><div class="v">'+money(paid)+'</div></div>'
      +'<div class="card"><div class="k">Balance</div><div class="v">'+money(bal)+'</div></div></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px" class="ws-grid">';
    h+='<div class="panel"><h3>Client</h3><div style="font-size:.9rem;line-height:1.9">'
      +'<div><b>Business:</b> '+esc(c.business_name||f.biz_name||'-')+'</div>'
      +'<div><b>Contact:</b> '+esc(c.contact_name||f.contact_name||'-')+'</div>'
      +'<div><b>Email:</b> '+esc(c.email||f.contact_email||'-')+'</div>'
      +'<div><b>Phone:</b> '+esc(c.phone||f.contact_phone||'-')+'</div>'
      +'<div><b>Industry:</b> '+esc(f.industry||'-')+'</div>'
      +'<div><b>Goals:</b> '+esc(f.goals||f.cur_goals||'-')+'</div>'
      +'<div><b>Timeline:</b> '+esc(f.timeline||'-')+' · <b>Budget:</b> '+esc(f.budget||'-')+'</div></div></div>';
    h+='<div class="panel"><h3>Website / Domain / Hosting</h3>'
      +'<div class="field"><label>Live URL</label><input id="ws_website_url" value="'+esc(p.website_url||f.cur_url||'')+'"></div>'
      +'<div class="field"><label>Staging URL</label><input id="ws_staging_url" value="'+esc(p.staging_url||'')+'"></div>'
      +'<div class="field"><label>Domain</label><input id="ws_domain" value="'+esc(p.domain||'')+'"></div>'
      +'<div class="field"><label>Hosting</label><input id="ws_hosting" value="'+esc(p.hosting||'')+'"></div>'
      +'<div class="field"><label>Maintenance plan</label><input id="ws_maintenance_plan" value="'+esc(p.maintenance_plan||'')+'"></div>'
      +'<button class="btn sm" id="wsSiteBtn">Save website info</button></div>';
    h+='<div class="panel"><h3>Invoices &amp; payments</h3>'+table([{key:'amount',label:'Amount',get:function(r){return money(r.amount);}},{key:'status',label:'Status'},{key:'created_at',label:'Created',get:function(r){return (r.created_at||'').slice(0,10);}}], w.invoices)
      +'<div class="row-form" style="margin-top:10px"><div><label>New invoice (USD)</label><input id="ws_inv_amt" type="number"></div><div><button class="btn sm" id="wsInvBtn">Create &amp; email invoice</button></div></div><div class="err" id="wsInvErr"></div></div>';
    h+='<div class="panel"><h3>Tasks</h3><div id="wsTasks">'+(w.tasks.length? w.tasks.map(function(t){return '<div style="display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)"><span>'+(t.status==='done'?'✓ ':'')+esc(t.title)+' <span class="muted" style="font-size:.78rem">'+esc(t.priority||'')+(t.due_date?(' · due '+esc(t.due_date)):'')+'</span></span>'+(t.status!=='done'?'<button class="btn ghost sm" data-taskdone="'+esc(t.id)+'">Done</button>':'')+'</div>';}).join(''):'<div class="empty">No tasks.</div>')+'</div>'
      +'<div class="row-form" style="margin-top:10px"><div style="flex:1"><label>New task</label><input id="ws_task_title"></div><div><label>Priority</label><select id="ws_task_pri"><option>normal</option><option>high</option><option>low</option></select></div><div><label>Due</label><input id="ws_task_due" type="date"></div><div><button class="btn sm" id="wsTaskBtn">Add</button></div></div></div>';
    h+='<div class="panel"><h3>Notes</h3><div id="wsNotes">'+(w.notes.length? w.notes.map(function(n){return '<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:.9rem">'+(n.pinned?'📌 ':'')+esc(n.body)+'</div>';}).join(''):'<div class="empty">No notes.</div>')+'</div>'
      +'<div class="row-form" style="margin-top:10px"><div style="flex:1"><label>New note</label><input id="ws_note_body"></div><div><label style="font-weight:400;font-size:.8rem"><input type="checkbox" id="ws_note_pin"> pin</label></div><div><button class="btn sm" id="wsNoteBtn">Add</button></div></div></div>';
    h+='<div class="panel"><h3>Internal messages</h3><div id="wsMsgs" style="max-height:170px;overflow:auto">'+(w.messages.length? w.messages.map(function(mm){return '<div style="padding:4px 0;font-size:.88rem"><b>'+esc(mm.sender)+':</b> '+esc(mm.body)+'</div>';}).join(''):'<div class="empty">No messages.</div>')+'</div>'
      +'<div class="row-form" style="margin-top:8px"><div style="flex:1"><input id="ws_msg" placeholder="Add an internal note/message"></div><div><button class="btn sm" id="wsMsgBtn">Post</button></div></div></div>';
    h+='<div class="panel"><h3>Email the client</h3>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+Object.keys(EMAIL_TEMPLATES).map(function(k){return '<button class="btn ghost sm" data-tpl="'+esc(k)+'">'+esc(k)+'</button>';}).join('')+'</div>'
      +'<div class="field"><label>To</label><input id="ws_em_to" value="'+esc(c.email||f.contact_email||'')+'"></div>'
      +'<div class="field"><label>Subject</label><input id="ws_em_subj"></div>'
      +'<div class="field"><label>Message</label><textarea id="ws_em_body" rows="5"></textarea></div>'
      +'<button class="btn sm" id="wsEmailBtn">Send email</button><div class="err" id="wsEmailErr"></div></div>';
    h+='</div>';
    h+='<div class="panel"><h3>Timeline</h3>'+table([{key:'type',label:'Event'},{key:'message',label:'Detail'},{key:'created_at',label:'When',get:function(r){return (r.created_at||'').replace('T',' ').slice(0,16);}}], w.activities)+'</div>';
    C.innerHTML=h;
    wireWorkspace(ref);
  }

  function wireWorkspace(ref){
    var refresh=function(){ openWorkspace(ref); };
    var post=function(sub,body,method){ return api('/api/admin/projects/'+encodeURIComponent(ref)+sub,{method:method||'POST',body:body||{}}); };
    document.getElementById('wsBack').onclick=function(){ CURRENT_WS=null; renderView('projects'); };
    document.getElementById('wsStatusBtn').onclick=async function(){ var s=(wsVal('wsStatusCustom')||'').trim()||wsVal('wsStatus'); try{ await post('/status',{status:s},'PATCH'); refresh(); }catch(ex){ alert(ex.message); } };
    document.getElementById('wsSiteBtn').onclick=async function(){ try{ await post('/website',{website_url:wsVal('ws_website_url'),staging_url:wsVal('ws_staging_url'),domain:wsVal('ws_domain'),hosting:wsVal('ws_hosting'),maintenance_plan:wsVal('ws_maintenance_plan')},'PATCH'); alert('Website info saved'); }catch(ex){ alert(ex.message); } };
    document.getElementById('wsInvBtn').onclick=async function(){ var a=Number(wsVal('ws_inv_amt')); if(!a){ document.getElementById('wsInvErr').textContent='Enter an amount'; return; } try{ await post('/invoice',{amount:a}); refresh(); }catch(ex){ document.getElementById('wsInvErr').textContent=ex.message; } };
    document.getElementById('wsTaskBtn').onclick=async function(){ var t=wsVal('ws_task_title').trim(); if(!t)return; try{ await post('/tasks',{title:t,priority:wsVal('ws_task_pri'),due_date:wsVal('ws_task_due')}); refresh(); }catch(ex){ alert(ex.message); } };
    Array.prototype.forEach.call(document.querySelectorAll('[data-taskdone]'),function(b){ b.onclick=async function(){ try{ await api('/api/admin/tasks/'+b.getAttribute('data-taskdone'),{method:'PATCH',body:{status:'done'}}); refresh(); }catch(ex){ alert(ex.message); } }; });
    document.getElementById('wsNoteBtn').onclick=async function(){ var b=wsVal('ws_note_body').trim(); if(!b)return; try{ await post('/notes',{body:b,pinned:document.getElementById('ws_note_pin').checked}); refresh(); }catch(ex){ alert(ex.message); } };
    document.getElementById('wsMsgBtn').onclick=async function(){ var b=wsVal('ws_msg').trim(); if(!b)return; try{ await post('/messages',{body:b}); refresh(); }catch(ex){ alert(ex.message); } };
    Array.prototype.forEach.call(document.querySelectorAll('[data-tpl]'),function(b){ b.onclick=function(){ var t=EMAIL_TEMPLATES[b.getAttribute('data-tpl')]; document.getElementById('ws_em_subj').value=t.s; document.getElementById('ws_em_body').value=t.b.split('{name}').join(CURRENT_WS_CLIENT_NAME); }; });
    document.getElementById('wsEmailBtn').onclick=async function(){ var to=wsVal('ws_em_to').trim(); if(!to){ document.getElementById('wsEmailErr').textContent='Recipient required'; return; } try{ await post('/email',{to:to,subject:wsVal('ws_em_subj'),body:wsVal('ws_em_body')}); document.getElementById('wsEmailErr').textContent=''; alert('Email sent'); refresh(); }catch(ex){ document.getElementById('wsEmailErr').textContent=ex.message; } };
  }

  // --- start ---
  if(state.token){ showApp(); }
  else {
    document.getElementById('login').classList.remove('hidden');
    if(!state.api){ document.getElementById('loginErr').textContent=''; }
  }
})();
</script>
</body>
</html>
